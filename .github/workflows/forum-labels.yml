name: Sync Forum Labels

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/forum-labels.json"
      - ".github/workflows/forum-labels.yml"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const labels = JSON.parse(fs.readFileSync('.github/forum-labels.json', 'utf8'));

            for (const label of labels) {
              const payload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description || ''
              };

              try {
                await github.rest.issues.updateLabel(payload);
                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel(payload);
                core.info(`Created label: ${label.name}`);
              }
            }
